<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="admin-login-shell">
      <section class="admin-login-card">
        <p class="eyebrow">Acesso interno</p>
        <h1>Seu painel administrativo</h1>
        <p class="sidebar-copy">
          Esse acesso fica separado do site do barbeiro. Entre com o seu PIN admin para abrir o painel de controle.
        </p>

        <form id="adminLoginForm" class="form-grid">
          <label>
            PIN admin
            <input id="adminPinInput" type="password" placeholder="Digite seu PIN" required />
          </label>

          <button type="submit" class="primary-button">Entrar no painel</button>
        </form>

        <p id="adminLoginMessage" class="form-message"></p>
      </section>
    </main>

    <script src="/controle-interno/assets/login.js"></script>
  </body>
</html>
